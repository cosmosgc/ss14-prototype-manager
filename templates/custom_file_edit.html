{% extends "base.html" %}
{% block title %}Edit Custom File | SS14 Prototype Manager{% endblock %}
{% block content %}
<div class="mb-4 flex items-center justify-between">
  <div>
    <h1 class="text-xl font-semibold">Edit Custom File</h1>
    <p class="font-mono text-xs text-slate-600">Resources/Prototypes/{{ custom_dir }}/{{ rel_path }}</p>
  </div>
  <a href="{{ url_for('custom_files') }}" class="rounded border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Back</a>
</div>

{% if not parse_ok %}
  <div class="mb-4 rounded border border-rose-300 bg-rose-50 px-3 py-2 text-sm text-rose-700">
    YAML parse error: {{ parse_error }}
  </div>
{% endif %}

<section class="rounded-xl border border-slate-200 bg-white p-4">
  <form method="post" action="{{ url_for('custom_file_edit', file=rel_path) }}">
    <textarea name="content" class="min-h-[70vh] w-full rounded border border-slate-300 bg-slate-50 p-3 font-mono text-xs">{{ content }}</textarea>
    <button class="mt-3 rounded bg-emerald-600 px-3 py-2 text-sm text-white hover:bg-emerald-700">Save</button>
  </form>
</section>
{% endblock %}
