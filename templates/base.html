<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>{% block title %}SS14 Prototype Manager{% endblock %}</title>
  <link href="{{ url_for('static', filename='dist/output.css') }}" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  <style>[x-cloak]{display:none!important;}</style>
  {% block extra_styles %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  {% include 'nav.html' %}
  <main class="mx-auto max-w-7xl px-4 py-6 flex-1 overflow-y-auto {% block main_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4 space-y-2">
          {% for category, message in messages %}
            <div class="rounded border px-3 py-2 text-sm {{ 'border-red-300 bg-red-50 text-red-700' if category == 'error' else 'border-emerald-300 bg-emerald-50 text-emerald-700' }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
